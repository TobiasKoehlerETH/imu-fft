name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply before publishing
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Exact version to publish instead of applying the bump, for example 0.1.0
        required: false
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Determine release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $requestedVersion = "${{ inputs.version }}"
            if ($requestedVersion) {
              $version = node scripts/bump-version.mjs --set $requestedVersion
            } else {
              $version = node scripts/bump-version.mjs --bump "${{ inputs.bump }}"
            }
          } else {
            $version = "${{ github.ref_name }}" -replace "^v", ""
            node scripts/bump-version.mjs --check $version
          }

          "app_version=$version" >> $env:GITHUB_OUTPUT

      - name: Commit and tag release version
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.app_version }}"
          $tag = "v$version"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin

          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          if (-not (git diff --cached --quiet)) {
            git commit -m "chore: release $tag"
            git push origin "HEAD:${{ github.ref_name }}"
          }

          if (git ls-remote --exit-code --tags origin $tag) {
            Write-Host "Tag $tag already exists on origin"
          } else {
            git tag $tag
            git push origin $tag
          }

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.version.outputs.app_version }}
          releaseName: IMU FFT v${{ steps.version.outputs.app_version }}
          releaseBody: |
            Major changes:
            - Stabilizes topbar readout widths so live values no longer shift neighboring controls.
            - Adds a little extra readout padding for a calmer topbar layout.
            - Removes the question-mark help cursor from the top-left status LED hover state.
            - Keeps the shared status tooltip behavior for connected, simulation, and no-sensor states.

            Download the Windows installer asset named `IMU.FFT_${{ steps.version.outputs.app_version }}_x64_en-US.msi`.

            The `.sig` file and `latest.json` asset are used by the in-app auto updater and do not need to be downloaded manually.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
