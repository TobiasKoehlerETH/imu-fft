<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMU FFT</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar-left">
          <div class="status-pill">
            <span id="status-dot" class="status-dot searching"></span>
            <span id="status-text" class="status-text">Searching</span>
            <span id="detail-text" class="status-detail">Waiting for serial port</span>
          </div>
        </div>
        <div class="topbar-right">
          <div class="top-readouts">
            <div class="top-readout">
              <span class="top-readout-label">Peak</span>
              <strong id="peak-value">0.00 Hz</strong>
              <span class="axis-chip" id="peak-axis">X</span>
            </div>
            <div class="top-readout">
              <span class="top-readout-label">Ax</span>
              <strong id="head-ax">0.000</strong>
            </div>
            <div class="top-readout">
              <span class="top-readout-label">Ay</span>
              <strong id="head-ay">0.000</strong>
            </div>
            <div class="top-readout">
              <span class="top-readout-label">Az</span>
              <strong id="head-az">0.000</strong>
            </div>
          </div>
          <div class="topbar-controls">
            <label class="switch-control" for="simulation-toggle">
              <input id="simulation-toggle" type="checkbox" />
              <span class="switch-track" aria-hidden="true">
                <span class="switch-thumb"></span>
              </span>
              <span class="switch-label">Simulation</span>
            </label>
            <button id="tare-button" class="ghost-button icon-button" type="button" aria-label="Tare" title="Tare">
              <span id="tare-icon" class="button-icon" aria-hidden="true"></span>
            </button>
            <div id="update-notice" class="update-notice" hidden>
              <span id="update-icon" class="update-icon" aria-hidden="true"></span>
              <span id="update-text" class="update-text" aria-live="polite">Update available</span>
              <button id="update-install-button" class="ghost-button update-button" type="button">
                Install
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="panel model-panel" aria-label="3D model">
          <div class="panel-title">
            <span class="panel-title-label">3D</span>
            <span class="panel-title-tag" id="model-rate">0 Hz</span>
          </div>
          <div id="model-view"></div>
        </section>

        <section class="charts" aria-label="Live charts">
          <div class="panel chart-panel fft-panel">
            <div class="panel-title">
              <span class="panel-title-label">Accelerometer</span>
              <div class="legend">
                <button class="legend-item" type="button" data-accel-axis="x" aria-pressed="true">
                  <span class="legend-dot" style="background:#e11d74"></span>X
                </button>
                <button class="legend-item" type="button" data-accel-axis="y" aria-pressed="true">
                  <span class="legend-dot" style="background:#7c3aed"></span>Y
                </button>
                <button class="legend-item" type="button" data-accel-axis="z" aria-pressed="true">
                  <span class="legend-dot" style="background:#0ea5a4"></span>Z
                </button>
                <span class="panel-title-tag">8 kHz</span>
              </div>
            </div>
            <div id="accel-chart" class="live-chart"></div>
          </div>
          <div class="panel chart-panel">
            <div class="panel-title">
              <span class="panel-title-group">
                <span class="panel-title-label">FFT</span>
                <span class="badge badge-peak">Peak</span>
              </span>
            </div>
            <div id="fft-chart" class="live-chart"></div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
